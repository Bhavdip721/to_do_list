<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./image/icon.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Task</title>
  </head>

  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
        @apply px-2 py-1;
        @apply border border-black;
        @apply rounded-xl;
        @apply hover:bg-orange-600;
        @apply transition duration-500;
        @apply bg-orange-400;
      }
    }
  </style>

  <body>
    <!-- header -->
    <header class="sticky top-0 py-4 bg-orange-100">
      <button class="block md:hidden pl-8" onclick="nav()">&#9776;</button>
      <div
        id="sidenav"
        class="hidden fixed top-0 z-100 bg-orange-100 w-7/10 min-h-screen px-8 flex-col gap-4"
      >
        <button onclick="closenav()" class="self-start mt-4">&times;</button>
        <button onclick="closenav()" class="btn-primary todo-btn">
          TO DO List
        </button>
        <button onclick="closenav()" class="btn-primary calulator-btn">
          Calculator
        </button>

        <button onclick="closenav()" class="btn-primary currency-btn">
          Currency Converter
        </button>
        <button onclick="closenav()" class="btn-primary clock-btn">
          Digital Clock
        </button>
        <button onclick="closenav()" class="btn-primary form-btn">Form</button>
      </div>

      <nav class="hidden md:flex justify-between px-8 items-center">
        <button class="btn-primary todo-btn">TO DO List</button>
        <button class="btn-primary calulator-btn">Calculator</button>

        <button class="btn-primary currency-btn">Currency Converter</button>
        <button class="btn-primary clock-btn">Digital Clock</button>
        <button class="btn-primary form-btn">Form</button>
      </nav>
    </header>
    <h1 class="text-5xl text-center mt-4">Task</h1>

    <!-- to do list -->
    <section class="flex justify-center px-8" id="todo_list">
      <div
        class="w-full md:w-xl flex flex-col gap-2 mt-8 p-4 border border-orange-600 rounded-xl"
      >
        <div
          class="mt-4 flex gap-4 flex-col md:flex-row md:gap-8 px-4 md:px-8 py-4 border border-orange-600 rounded-xl shadow-md"
        >
          <input
            id="task"
            type="text"
            placeholder="Add your task"
            class="w-full flex-1 p-2 outline-none ring-1 ring-orange-500 rounded-xl focus:ring-1 focus:ring-red-700 transition duration-500"
          />
          <button
            id="add_task"
            class="self-end md:self-stretch font-semibold px-2 py-1 bg-orange-400 border border-black rounded-xl outline-none hover:bg-orange-700 hover:text-white transition duration-500"
          >
            Add Task
          </button>
        </div>
        <button
          id="delete-all"
          class="mt-4 self-end border border-black bg-red-500 px-2 py-1 rounded-xl hover:bg-red-600 text-white transition duration-500"
        >
          delete all
        </button>
        <div id="list" class="flex flex-col gap-4"></div>
      </div>
    </section>

    <!-- calculator -->
    <section id="calculator" class="hidden px-8 flex justify-center mt-8">
      <div class="w-full md:w-xl px-4 py-8 border border-orange-600 rounded-xl">
        <div
          id="cal-content"
          class="w-full min-h-20 h-auto border border-orange-600 rounded-xl"
        >
          <p id="entered_value" class="px-4 break-words"></p>
          <p id="ans" class="mt-4 text-2xl font-bold px-4"></p>
        </div>
        <div class="grid grid-cols-4 gap-2 mt-8" id="cal-btn">
          <button class="btn-primary" data="ce">CE</button>
          <button class="btn-primary col-span-2" data="ac">AC</button>
          <button class="btn-primary" data="/">/</button>
          <button class="btn-primary" data="7">7</button>
          <button class="btn-primary" data="8">8</button>
          <button class="btn-primary" data="9">9</button>
          <button class="btn-primary" data="*">*</button>
          <button class="btn-primary" data="4">4</button>
          <button class="btn-primary" data="5">5</button>
          <button class="btn-primary" data="6">6</button>
          <button class="btn-primary" data="-">-</button>
          <button class="btn-primary" data="1">1</button>
          <button class="btn-primary" data="2">2</button>
          <button class="btn-primary" data="3">3</button>
          <button class="btn-primary" data="+">+</button>
          <button class="btn-primary col-span-2" data="0">0</button>
          <button class="btn-primary" data=".">.</button>
          <button class="btn-primary" data="=" id="answer">=</button>
        </div>
      </div>
    </section>

    <!-- currency converter -->
    <section id="currency_converter" class="hidden mt-8 px-8">
      <div
        class="flex flex-col gap-8 items-center p-4 border border-orange-600 rounded-xl"
      >
        <input
          id="amount"
          type="number"
          class="outline-none self-center border border-black p-2 rounded-xl focus:ring-2 focus:ring-black"
          placeholder="enter value"
        />
        <div class="flex flex-col md:flex-row gap-12">
          <div class="flex flex-col sm:flex-row gap-4 items-center">
            <label for="form" class="font-bold text-xl">From : </label>
            <select
              name="from"
              id="currency-from"
              class="border border-black p-2 rounded-xl"
            >
              <option value="93.26" selected>Indian Rupee (₹)</option>
              <option value="1">US Dollar ($)</option>
              <option value="0.87">Euro (€)</option>
              <option value="0.75">British Pound Sterling (£)</option>
              <option value="159.25">Japanese Yen (¥)</option>
              <option value="1.42">Australian Dollar ($)</option>
              <option value="1.37">Canadian Dollar ($)</option>
              <option value="0.80">Swiss Franc (CHF)</option>
              <option value="6.87">Chinese Yuan (¥)</option>
              <option value="86.03">Russian Ruble (₽)</option>
              <option value="17.85">Mexican Peso ($)</option>
              <option value="5.42">Brazilian Real (R$)</option>
              <option value="19.10">South African Rand (R)</option>
              <option value="1.38">Singapore Dollar ($)</option>
              <option value="1.68">New Zealand Dollar ($)</option>
              <option value="7.82">HKD: Hong Kong Dollar (HK$)</option>
              <option value="10.65">SEK: Swedish Krona (kr)</option>

              <option value="3.67">UAE Dirham (د.إ)</option>
            </select>
          </div>
          <div class="flex gap-4 flex-col sm:flex-row items-center">
            <label for="form" class="font-bold text-xl">To : </label>
            <select
              name="from"
              id="currency-to"
              class="border border-black p-2 rounded-xl"
            >
              <option value="93.26" selected>Indian Rupee (₹)</option>
              <option value="1">US Dollar ($)</option>
              <option value="0.87">Euro (€)</option>
              <option value="0.75">British Pound Sterling (£)</option>
              <option value="159.25">Japanese Yen (¥)</option>
              <option value="1.42">Australian Dollar ($)</option>
              <option value="1.37">Canadian Dollar ($)</option>
              <option value="0.80">Swiss Franc (CHF)</option>
              <option value="6.87">Chinese Yuan (¥)</option>
              <option value="86.03">Russian Ruble (₽)</option>
              <option value="17.85">Mexican Peso ($)</option>
              <option value="5.42">Brazilian Real (R$)</option>
              <option value="19.10">South African Rand (R)</option>
              <option value="1.38">Singapore Dollar ($)</option>
              <option value="1.68">New Zealand Dollar ($)</option>
              <option value="7.82">HKD: Hong Kong Dollar (HK$)</option>
              <option value="10.65">SEK: Swedish Krona (kr)</option>

              <option value="3.67">UAE Dirham (د.إ)</option>
            </select>
          </div>
        </div>

        <button
          id="convert"
          class="border border-black bg-orange-400 px-4 py-2 text-xl rounded-xl hover:bg-orange-600 hover:text-white transition duration-500"
        >
          Convert
        </button>
        <div id="convert-currency" class="text-xl font-bold"></div>
      </div>
    </section>

    <!-- clock -->

    <section id="clock" class="hidden mt-4 justify-center px-8">
      <div class="border border-orange-600 w-full md:w-xl rounded-xl p-4">
        <div class="border border-orange-600 rounded-xl p-4">
          <h2 class="text-2xl font-bold">Time</h2>
          <p id="time" class="text-2xl mt-4"></p>
        </div>
        <div class="border border-orange-600 w-full mt-4 rounded-xl p-4">
          <h2 class="text-2xl font-bold">Timer</h2>
          <p class="text-2xl mt-4" id="timer">00:00:00</p>
          <input
            type="text"
            id="timer_value"
            value="00:00:00"
            class="mt-4 border border-black rounded-xl p-2 outline-none focus:ring-2"
            maxlength="8"
            title="format-hours:minutes:seconds"
            disabled
          />
          <div class="flex gap-2 mt-4">
            <button class="btn-primary px-4" id="timer_set">Set</button>
            <button class="btn-primary" id="timer_start">start</button>
            <button class="btn-primary" id="timer_clear">Clear</button>
          </div>
        </div>
        <div class="border border-orange-600 w-full mt-4 rounded-xl p-4">
          <h2 class="text-2xl font-bold">Stop watch</h2>
          <p class="text-2xl mt-4" id="watch">00:00:00</p>
          <div class="flex gap-2 mt-4">
            <button class="btn-primary" id="watch_start">Start</button>
            <button class="btn-primary" id="watch_stop">Stop</button>
          </div>
        </div>
      </div>
    </section>

    <!-- from -->
    <section id="form" class="hidden justify-center px-8 mt-4">
      <div class="w-full md:w-xl flex flex-col gap-4">
        <form
          id="form_user"
          method="post"
          class="flex flex-col gap-4 w-full border border-orange-600 rounded-xl p-4"
        >
          <div class="flex gap-4 items-center flex-col sm:flex-row">
            <label for="name">Name</label>
            <input
              id="form-name"
              type="text"
              name="name"
              class="outline-none border border-black rounded-xl p-2 focus:ring-2"
              placeholder="enter your name"
              required
            />
          </div>
          <div class="flex gap-4 items-center flex-col sm:flex-row">
            <label for="email">email</label>
            <input
              type="email"
              name="email"
              class="outline-none border border-black rounded-xl p-2 focus:ring-2"
              placeholder="enter your mail"
              required
            />
          </div>
          <div class="flex items-center gap-4 items-center">
            <label class="flex gap-2 items-center">
              <input type="radio" name="gender" value="male" required />
              <span>Male</span>
            </label>
            <label class="flex gap-2 items-center">
              <input type="radio" name="gender" value="Female" required />
              <span>Female</span>
            </label>
          </div>
          <div
            class="flex gap-4 items-center flex-col sm:flex-row"
            id="number_container"
          >
            <label for="number">Number</label>
            <input
              id="number"
              type="tel"
              name="number"
              pattern="[0-9]{10}"
              class="outline-none border border-black rounded-xl p-2 focus:ring-2"
              placeholder=" eg 9908886759"
              required
            />
          </div>
          <div>
            <div
              class="flex gap-4 items-center flex-col sm:flex-row text-xs sm:text-base"
            >
              <label for="country">Country</label>
              <select
                name="country"
                id="country"
                class="border p-2 rounded-xl"
                required
              >
                <option disabled selected hidden>Select your country</option>
              </select>
            </div>
          </div>
          <div class="flex gap-4 items-center flex-col sm:flex-row">
            <label for="state">State</label>
            <select
              name="state"
              id="state"
              class="border p-2 rounded-xl"
              required
            ></select>
          </div>

          <div class="flex gap-4 items-center flex-col sm:flex-row">
            <label for="city">City</label>
            <select
              name="city"
              id="city"
              class="border p-2 rounded-xl"
              required
            ></select>
          </div>
          <div
            class="flex gap-4 items-center flex-col sm:flex-row"
            id="pincode"
          >
            <label for="pincode">Pincode</label>
            <input
              type="text"
              placeholder="eg 787887"
              class="border rounded-xl outline-none p-2 focus:ring-2"
              name="pincode"
              id="pin_number"
              maxlength="6"
              pattern="[0-9]{6}"
              required
            />
          </div>
          <textarea
            name="bio"
            id="bio"
            placeholder="about you"
            class="border rounded-xl p-2 outline-none focus:ring-2"
            required
          ></textarea>
          <textarea
            name="description"
            id="dis"
            placeholder="description"
            class="border rounded-xl p-2 outline-none focus:ring-2"
            required
          ></textarea>

          <button type="submit" class="btn-primary self-center">submit</button>
        </form>

        <div
          class="w-full flex flex-col gap-4 p-4 border border-orange-600 rounded-xl"
        >
          <div
            class="border border-orange-600 rounded-xl p-4 flex flex-col sm:flex-row gap-4"
          >
            <input
              type="search"
              id="search"
              placeholder="search by name or mail"
              class="border rounded-xl flex-1 p-2 outline-none focus:ring-2"
            />
            <div class="self-end">
              <button>
                <img
                  src="./image/filter-icon.svg"
                  alt="filter icon"
                  class="w-8 h-auto"
                />
              </button>
            </div>
          </div>
          <div id="user"></div>
        </div>
      </div>
    </section>

    <script src="./todo.js"></script>
  </body>
</html>
